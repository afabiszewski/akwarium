<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content=""
    >
    <title></title>
    <link rel="stylesheet" href="styles.css">
    <script src="translations.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" data-i18n="brand.name"></a>
      <nav
        class="site-nav"
        aria-label=""
        data-i18n-aria-label="nav.label"
      >
        <a href="#apartments" data-i18n="nav.apartments"></a>
        <a href="#location" data-i18n="nav.location"></a>
        <a href="#contact" data-i18n="nav.contact"></a>
      </nav>
      <div
        class="language-switcher"
        role="group"
        aria-label=""
        data-i18n-aria-label="language.label"
      >
        <button
          type="button"
          data-language="pl"
          data-i18n="language.polish"
          aria-pressed="false"
        ></button>
        <button
          type="button"
          data-language="en"
          data-i18n="language.english"
          aria-pressed="false"
        ></button>
        <button
          type="button"
          data-language="de"
          data-i18n="language.german"
          aria-pressed="false"
        ></button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-content">
          <p class="eyebrow" data-i18n="hero.eyebrow"></p>
          <h1 data-i18n="hero.title"></h1>
          <p data-i18n="hero.description"></p>
          <a class="button" href="#contact" data-i18n="hero.cta"></a>
        </div>
      </section>

      <section id="apartments" class="section">
        <div class="section-inner">
          <h2 data-i18n="apartments.title"></h2>
          <p data-i18n="apartments.description"></p>
        </div>
      </section>

      <section id="location" class="section section-muted">
        <div class="section-inner">
          <h2 data-i18n="location.title"></h2>
          <p data-i18n="location.description"></p>
        </div>
      </section>
    </main>

    <footer id="contact" class="site-footer">
      <p data-i18n="footer.contact"></p>
    </footer>
  </body>
</html>
